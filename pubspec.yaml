name: signverse
description: "Real-time ASL translation application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP client
  dio: ^5.4.3+1
  http_parser: ^4.1.0

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # Local preferences
  shared_preferences: ^2.2.3

  # Connectivity & Network
  connectivity_plus: ^6.0.3

  # Camera & ML
  hand_detection: ^3.1.2
  opencv_dart: ^2.2.1+4

  # Text to speech
  flutter_tts: ^4.0.2

  # Fonts
  google_fonts: ^6.2.1

  # UI & Animations
  smooth_page_indicator: ^1.1.0
  animated_text_kit: ^4.2.2
  lottie: ^3.1.0
  flutter_animate: ^4.5.0

  # Icons
  cupertino_icons: ^1.0.6
  camera: ^0.12.0+1

  # Image & Media
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/models/